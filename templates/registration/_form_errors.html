{% if form.errors %}
<div class="auth-error" role="alert">
  {% for field in form %}{% for error in field.errors %}
  <p>{{ error|escape }}{% if "already exists" in error %} <a href="{% url 'login' %}" class="auth-link">Log in</a>{% endif %}</p>
  {% endfor %}{% endfor %}
  {% for error in form.non_field_errors %}
  <p>{{ error|escape }}</p>
  {% endfor %}
</div>
{% endif %}
