<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <title>{% block title %}The Daily Inquirer{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link rel="preload" href="/static/font/ElmsSans-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/static/font/SpecialElite-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link href="/static/css/fonts.css" rel="stylesheet">
    <link href="/static/css/tokens.css" rel="stylesheet">
    <link href="/static/css/auth.css" rel="stylesheet">
    <link href="/static/css/footer.css" rel="stylesheet">
</head>

<body class="auth-page">
    <main class="auth-main">
        <div class="auth-wordmark"><a href="{% if user.is_authenticated %}/dash/{% else %}/{% endif %}">The Daily Inquirer</a></div>
        <div class="auth-card">
            {% block card %}{% endblock %}
        </div>
    </main>
    {% include "core/_footer.html" %}
</body>

</html>
