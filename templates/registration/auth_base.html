<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <title>{% block title %}The Daily Inquirer{% endblock %}</title>
    <link rel="preload" href="/static/font/ElmsSans-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/static/font/SpecialElite-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link href="/static/css/fonts.css" rel="stylesheet">
    <link href="/static/css/tokens.css" rel="stylesheet">
    <link href="/static/css/auth.css" rel="stylesheet">
</head>

<body class="auth-page">
    <main class="auth-main">
        <div class="auth-wordmark"><a href="/">The Daily Inquirer</a></div>
        <div class="auth-card">
            {% block card %}{% endblock %}
        </div>
    </main>
    <footer class="auth-footer">
        <p><a href="/terms/">Terms</a><a href="/privacy/">Privacy</a></p>
    </footer>
</body>

</html>
