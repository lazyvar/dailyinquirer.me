app = "dailyinquirer"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  # Never auto-stop: the in-process hourly prompt cron (supercronic) must keep
  # running even with no inbound HTTP traffic. Background jobs do not count as
  # traffic, so an autostopped machine would silently skip prompt deliveries.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
